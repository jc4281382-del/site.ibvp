<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA 3D Volumoso - Vertical à Direita (Lento)</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: sans-serif;
            color: #333;
        }
        canvas { 
            display: block; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>> Sequenciamento Otimizado</h2>
        <p>Animação suave e fluida em andamento...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const particleCount = 20000;
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const randomPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorPink = new THREE.Color(0xe91e63);  
        const colorBlue = new THREE.Color(0x1e88e5);  
        const colorPurple = new THREE.Color(0x8e24aa); 

        const dnaLength = 180; 
        const dnaRadius = 15;  
        const dnaTurns = 3.5;  
        const numRungs = 40;   
        
        const strandThickness = 4.5;
        const rungThickness = 2.5;

        for (let i = 0; i < particleCount; i++) {
            randomPositions[i * 3] = (Math.random() - 0.5) * 300;
            randomPositions[i * 3 + 1] = (Math.random() - 0.5) * 300;
            randomPositions[i * 3 + 2] = (Math.random() - 0.5) * 300;

            let px, py, pz;
            let particleColor = new THREE.Color();
            let type = Math.random();

            if (type < 0.65) {
                let t = Math.random(); 
                let angle = t * Math.PI * 2 * dnaTurns;
                let isStrand1 = Math.random() < 0.5;
                let strandOffset = isStrand1 ? 0 : Math.PI;

                let baseX = Math.cos(angle + strandOffset) * dnaRadius;
                let baseY = (t - 0.5) * dnaLength;
                let baseZ = Math.sin(angle + strandOffset) * dnaRadius;

                let r = Math.cbrt(Math.random()) * strandThickness;
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.acos(2 * Math.random() - 1);

                px = baseX + r * Math.sin(phi) * Math.cos(theta);
                py = baseY + r * Math.sin(phi) * Math.sin(theta);
                pz = baseZ + r * Math.cos(phi);

                particleColor = isStrand1 ? colorBlue : colorPink;

            } else {
                let rungIndex = Math.floor(Math.random() * numRungs);
                let t = rungIndex / (numRungs - 1);
                let angle = t * Math.PI * 2 * dnaTurns;

                let x1 = Math.cos(angle) * dnaRadius;
                let z1 = Math.sin(angle) * dnaRadius;
                let x2 = Math.cos(angle + Math.PI) * dnaRadius;
                let z2 = Math.sin(angle + Math.PI) * dnaRadius;
                
                let baseY = (t - 0.5) * dnaLength;
                let lerpFactor = Math.random(); 

                let centerX = x1 + (x2 - x1) * lerpFactor;
                let centerZ = z1 + (z2 - z1) * lerpFactor;

                let r = Math.cbrt(Math.random()) * rungThickness;
                let theta = Math.random() * Math.PI * 2;
                let phi = Math.acos(2 * Math.random() - 1);

                px = centerX + r * Math.sin(phi) * Math.cos(theta);
                py = baseY + r * Math.sin(phi) * Math.sin(theta);
                pz = centerZ + r * Math.cos(phi);

                particleColor.copy(colorBlue).lerp(colorPink, lerpFactor);
                if (lerpFactor > 0.3 && lerpFactor < 0.7) {
                    particleColor.lerp(colorPurple, 0.6);
                }
            }

            targetPositions[i * 3] = px;
            targetPositions[i * 3 + 1] = py;
            targetPositions[i * 3 + 2] = pz;

            colors[i * 3] = particleColor.r;
            colors[i * 3 + 1] = particleColor.g;
            colors[i * 3 + 2] = particleColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(randomPositions), 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const context = canvas.getContext('2d');
        context.beginPath();
        context.arc(16, 16, 14, 0, Math.PI * 2);
        context.fillStyle = "white";
        context.fill();
        const texture = new THREE.CanvasTexture(canvas);

        const material = new THREE.PointsMaterial({
            size: 1.0, 
            vertexColors: true,
            map: texture,
            transparent: true,
            opacity: 0.95,
            alphaTest: 0.1,
            depthWrite: false 
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Função para atualizar a câmera e o posicionamento do DNA dinamicamente
        function updateCameraZ() {
            if (window.innerWidth < 768) {
                camera.position.z = 200; // Afasta a câmera no celular
                particleSystem.position.x = 0; // Centraliza a animação no mobile
            } else {
                camera.position.z = 110; // Mantém o padrão no desktop
                particleSystem.position.x = 45; // Mantém à direita no desktop
            }
        }

        // Inicializa a câmera e posição
        updateCameraZ();

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            let elapsedTime = clock.getElapsedTime();
            
            // VELOCIDADE ALTERADA AQUI: de 0.4 para 0.2 (Montagem mais lenta)
            let cycle = Math.sin(elapsedTime * 0.2); 
            let lerpFactor = Math.max(0, Math.min(1, (cycle * 2.0))); 

            const currentPositions = particleSystem.geometry.attributes.position.array;

            for (let i = 0; i < particleCount; i++) {
                let ix = i * 3;
                let iy = i * 3 + 1;
                let iz = i * 3 + 2;

                currentPositions[ix] = randomPositions[ix] + (targetPositions[ix] - randomPositions[ix]) * lerpFactor;
                currentPositions[iy] = randomPositions[iy] + (targetPositions[iy] - randomPositions[iy]) * lerpFactor;
                currentPositions[iz] = randomPositions[iz] + (targetPositions[iz] - randomPositions[iz]) * lerpFactor;
            }

            particleSystem.geometry.attributes.position.needsUpdate = true;
            
            // VELOCIDADE DE ROTAÇÃO ALTERADA AQUI: de 0.2 para 0.1 (Giro mais lento)
            particleSystem.rotation.y = elapsedTime * 0.1; 

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            updateCameraZ();
        });

        animate();
    </script>
</body>
</html>
